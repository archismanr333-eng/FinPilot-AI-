services:
  # ============================================
  # Frontend — Next.js 15
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_AI_URL=http://ai-services:8000/api
    depends_on:
      - backend
      - ai-services
    networks:
      - finpilot-network

  # ============================================
  # Backend — Express.js
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-5050}:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-finpilot-ai-secret-key-2026}
      - DATABASE_URL=postgresql://finpilot:finpilot@postgres:5432/finpilot_db
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongo:27017/finpilot
      - AI_SERVICE_URL=http://ai-services:8000
    depends_on:
      - postgres
      - redis
      - mongo
    networks:
      - finpilot-network

  # ============================================
  # AI Services — FastAPI
  # ============================================
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - PINECONE_API_KEY=${PINECONE_API_KEY:-}
      - DATABASE_URL=postgresql://finpilot:finpilot@postgres:5432/finpilot_db
    networks:
      - finpilot-network

  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=finpilot
      - POSTGRES_PASSWORD=finpilot
      - POSTGRES_DB=finpilot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - finpilot-network

  # ============================================
  # MongoDB
  # ============================================
  mongo:
    image: mongo:7-jammy
    environment:
      - MONGO_INITDB_DATABASE=finpilot
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - finpilot-network

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finpilot-network

volumes:
  postgres_data:
  mongo_data:
  redis_data:

networks:
  finpilot-network:
    driver: bridge
